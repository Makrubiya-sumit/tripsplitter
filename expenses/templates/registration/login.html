{% extends 'base.html' %}
{% block title %}Login - Trip Expense Splitter{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card shadow-sm p-4">
    <div class="text-center mb-3">
      <i class="bi bi-compass-fill" style="font-size:2rem;color:var(--brand);"></i>
      <h4 class="fw-bold mt-2">Welcome Back 👋</h4>
      <p class="text-muted small">Login to your account</p>
    </div>

    {% if form.errors %}
      <div class="alert alert-danger py-2 small">Invalid email/username or password.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <p class="text-center small text-muted mt-3 mb-0">
      Don't have an account? <a href="{% url 'register' %}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
